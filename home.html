<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>Home-Page</title>

    <!-- tailwind css & daisy ui cdn link-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google fonts link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body class="max-w-[1600px] mx-auto">

    <header class="bg-white md:flex justify-between items-center py-4 px-5 md:px-20 shadow-2xl">
        <div class="flex items-center mb-3">
            <div class="w-8 md:w-9"><img src="./assets/github-logo.png" alt=""></div>
            <h1 class="text-2xl font-bold md:font-semibold ml-1">GitHub Issues Tracker</h1>
        </div>

        <div class="flex justify-center items-center gap-2">
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input id="search_input" type="search" class="text-[16px] font-semibold" required placeholder="Search issues..." />
            </label>
            <button id="search_btn" class="btn btn-primary text-white text-[16px] font-semibold"><i class="fa-solid fa-plus"></i> New
                Issue</button>
        </div>

    </header>

    <main class="bg-[#F8FAFC] py-14">

        <section class="max-w-7xl mx-auto bg-white rounded p-6 flex gap-2 mb-4 shadow">
            <button onclick="toggleStyle('all_toggle_btn')" id="all_toggle_btn"
                class="btn btn-primary w-28 text-[16px] font-semibold">All</button>
            <button onclick="toggleStyle('open_toggle_btn')" id="open_toggle_btn"
                class="btn btn-primary btn-soft w-28 text-[16px] font-semibold">Open</button>
            <button onclick="toggleStyle('closed_toggle_btn')" id="closed_toggle_btn"
                class="btn btn-primary btn-soft w-28 text-[16px] font-semibold">Closed</button>
        </section>

        <section class="flex justify-between items-center max-w-7xl mx-auto bg-white rounded p-6 shadow">
            <div class="flex justify-center items-center gap-2">
                <div class="p-2 rounded-full bg-[#ECE4FF]"><img class="w-8" src="./assets/Aperture.png" alt=""></div>
                <div>
                    <h1 class="text-[20px] font-bold"><span id="count">0</span> Issues</h1>
                    <p class="text-[16px] text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex justify-center items-center gap-4">
                <div class="flex justify-center items-center gap-2">
                    <div class="bg-[#00A96E] w-3 h-3 rounded-full"></div>
                    <p>Open</p>
                </div>
                <div class="flex justify-center items-center gap-2">
                    <div class="bg-[#A855F7] w-3 h-3 rounded-full"></div>
                    <p>Closed</p>
                </div>
            </div>
        </section>

        <div class="max-w-7xl mx-auto w-full h-0.5 bg-[#E4E4E7]"></div>

        <section class="flex justify-center items-center ">
            <span id="spinner" class="loading loading-spinner loading-xl hidden"></span>
        </section>

        <section id="card_container" class="max-w-7xl mx-auto bg-[#FBFBFB] rounded p-6 grid grid-cols-4 gap-3.5 shadow">
        </section>

        <dialog id="my_issue_modal" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
                <div id="modal_container">
                </div>

                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn btn-primary">Close</button>
                    </form>
                </div>
            </div>
        </dialog>


    </main>

    <script src="./scripts/home.js"></script>
</body>

</html>
